<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared clipboard</title>
    <meta
      name="description"
      content="A frictionless cross-device shared clipboard. No login, syncs across devices."
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("clipboard-theme");
          var dark =
            t === "dark" ||
            ((!t || t === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
